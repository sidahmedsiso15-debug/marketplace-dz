<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace DZ - متجر إلكتروني</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:1rem 0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.header-content{max-width:1200px;margin:0 auto;padding:0 15px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.5rem;font-weight:bold;display:flex;align-items:center;gap:8px}
.header-icons{display:flex;gap:15px;align-items:center}
.icon-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 15px;border-radius:20px;cursor:pointer;font-size:14px;transition:.3s}
.icon-btn:hover{background:rgba(255,255,255,.3)}
.cart-count{background:#ff4757;color:#fff;border-radius:50%;padding:2px 6px;font-size:11px;margin-right:5px}
.hero{background:linear-gradient(rgba(102,126,234,.9),rgba(118,75,162,.9)),url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><rect fill="%23667eea" width="1200" height="600"/></svg>');background-size:cover;color:#fff;padding:40px 15px;text-align:center}
.hero h1{font-size:2rem;margin-bottom:10px}
.hero p{font-size:1rem;opacity:.9}
.container{max-width:1200px;margin:0 auto;padding:15px}
.categories{display:flex;gap:10px;overflow-x:auto;padding:15px 0;margin-bottom:20px;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.cat-btn{background:#fff;border:2px solid #e0e0e0;padding:10px 20px;border-radius:25px;cursor:pointer;white-space:nowrap;font-size:14px;transition:.3s}
.cat-btn.active,.cat-btn:hover{background:#667eea;color:#fff;border-color:#667eea}
.search-box{margin-bottom:20px}
.search-input{width:100%;padding:12px 20px;border:2px solid #e0e0e0;border-radius:25px;font-size:15px;direction:rtl}
.search-input:focus{outline:none;border-color:#667eea}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;margin-bottom:30px}
.product{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:.3s;cursor:pointer}
.product:hover{transform:translateY(-5px);box-shadow:0 5px 20px rgba(0,0,0,.15)}
.product-img{width:100%;height:160px;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-badge{position:absolute;top:10px;right:10px;background:#ff4757;color:#fff;padding:4px 10px;border-radius:15px;font-size:11px;font-weight:bold}
.product-info{padding:12px}
.product-cat{color:#667eea;font-size:11px;margin-bottom:5px}
.product-name{font-size:14px;font-weight:bold;margin-bottom:8px;height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.product-price{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.price-current{color:#ff4757;font-size:18px;font-weight:bold}
.price-old{color:#999;text-decoration:line-through;font-size:13px}
.btn-add{width:100%;background:#667eea;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;transition:.3s}
.btn-add:hover{background:#5568d3}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:2000;overflow-y:auto}
.modal.active{display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:#fff;border-radius:15px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp.3s}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:1.3rem}
.close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#999}
.modal-body{padding:20px}
.cart-item{display:flex;gap:15px;padding:15px 0;border-bottom:1px solid #eee}
.cart-item-img{width:80px;height:80px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0}
.cart-item-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.cart-item-info{flex:1}
.cart-item-name{font-weight:bold;margin-bottom:5px;font-size:14px}
.cart-item-price{color:#ff4757;font-weight:bold;margin-bottom:8px}
.qty-controls{display:flex;align-items:center;gap:10px}
.qty-btn{background:#667eea;color:#fff;border:none;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
.qty-btn:hover{background:#5568d3}
.qty-num{font-weight:bold;min-width:25px;text-align:center}
.cart-total{background:#f8f9fa;padding:15px;border-radius:10px;margin:15px 0}
.total-row{display:flex;justify-content:space-between;margin-bottom:8px}
.total-row.final{font-size:1.2rem;font-weight:bold;color:#ff4757;border-top:2px solid #ddd;padding-top:8px;margin-top:8px}
.btn-checkout{width:100%;background:#25D366;color:#fff;border:none;padding:15px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.3s}
.btn-checkout:hover{background:#20ba5a}
.admin-tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid #eee}
.admin-tab{padding:10px 20px;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:15px;font-weight:bold;color:#666;transition:.3s}
.admin-tab.active{color:#667eea;border-bottom-color:#667eea}
.admin-section{display:none}
.admin-section.active{display:block}
.admin-input{width:100%;padding:10px 15px;border:2px solid #e0e0e0;border-radius:8px;margin-bottom:12px;font-size:14px;font-family:inherit}
.admin-input:focus{outline:none;border-color:#667eea}
.admin-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-admin{width:100%;background:#667eea;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:bold;margin-bottom:10px;transition:.3s}
.btn-admin:hover{background:#5568d3}
.img-preview{width:100%;height:200px;background:#f5f5f5;border-radius:8px;margin-bottom:12px;display:none;object-fit:cover}
.admin-product-list{max-height:400px;overflow-y:auto}
.admin-product-item{background:#f8f9fa;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.admin-product-thumb{width:60px;height:60px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.admin-product-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.admin-product-info{flex:1}
.admin-product-name{font-weight:bold;font-size:13px;margin-bottom:3px}
.admin-product-meta{font-size:11px;color:#666}
.admin-product-actions{display:flex;gap:5px}
.btn-edit,.btn-delete{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold}
.btn-edit{background:#3498db;color:#fff}
.btn-delete{background:#e74c3c;color:#fff}
.edit-form{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ddd}
.edit-form.open{display:block}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-save-edit{background:#27ae60;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold;flex:1}
.btn-cancel-edit{background:#95a5a6;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer;font-size:13px}
.edit-img-preview{width:100%;height:120px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:none}
.empty-cart{text-align:center;padding:40px 20px;color:#999}
.empty-cart-icon{font-size:4rem;margin-bottom:15px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 25px;border-radius:25px;z-index:3000;animation:fadeIn.3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.footer{background:#2c3e50;color:#fff;padding:30px 15px;text-align:center;margin-top:40px}
.footer-content{max-width:1200px;margin:0 auto}
.footer h3{margin-bottom:10px}
.footer p{opacity:.8;font-size:14px;margin-bottom:15px}
.social-links{display:flex;justify-content:center;gap:15px;font-size:1.5rem}
@media (max-width:768px){.hero h1{font-size:1.5rem}.products{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}.admin-row,.edit-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
<div class="header-content">
<div class="logo">🛍️ Marketplace DZ</div>
<div class="header-icons">
<button class="icon-btn" onclick="showAdmin()">⚙️</button>
<button class="icon-btn" onclick="showCart()">🛒 <span class="cart-count" id="cartCount">0</span></button>
</div>
</header>

<section class="hero">
<h1>🛍️ أفضل المنتجات بأفضل الأسعار</h1>
<p>تسوق الآن واطلب بكل سهولة من متجرنا</p>
</section>

<div class="container">
<div class="categories" id="categories">
<button class="cat-btn active" onclick="filterCat('all')">الكل</button>
<button class="cat-btn" onclick="filterCat('إلكترونيات')">📱 إلكترونيات</button>
<button class="cat-btn" onclick="filterCat('ملابس')">👕 ملابس</button>
<button class="cat-btn" onclick="filterCat('منزل')">🏠 منزل</button>
<button class="cat-btn" onclick="filterCat('جمال')">💄 جمال</button>
<button class="cat-btn" onclick="filterCat('رياضة')">⚽ رياضة</button>
</div>

<div class="search-box">
<input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن منتج..." onkeyup="searchProducts(this.value)">
</div>

<div class="products" id="productsGrid"></div>
</div>

<footer class="footer">
<div class="footer-content">
<h3>Marketplace DZ</h3>
<p>متجرك الإلكتروني الموثوق في الجزائر</p>
<div class="social-links">
<span>📘</span><span>📷</span><span>📱</span>
</div>
<p style="margin-top:20px;font-size:12px;opacity:.6">© 2025 جميع الحقوق محفوظة</p>
</div>
</footer>

<div class="modal" id="cartModal">
<div class="modal-content">
<div class="modal-header">
<h2>🛒 سلة التسوق</h2>
<button class="close-btn" onclick="closeCart()">×</button>
</div>
<div class="modal-body" id="cartBody"></div>
</div>
</div>

<div class="modal" id="adminModal">
<div class="modal-content">
<div class="modal-header">
<h2>⚙️ لوحة الإدارة</h2>
<button class="close-btn" onclick="closeAdmin()">×</button>
</div>
<div class="modal-body">
<div class="admin-tabs">
<button class="admin-tab active" onclick="switchTab('add')">➕ إضافة منتج</button>
<button class="admin-tab" onclick="switchTab('manage')">📋 إدارة المنتجات</button>
</div>
<div class="admin-section active" id="addSection">
<input type="text" id="pName" class="admin-input" placeholder="اسم المنتج">
<div class="admin-row">
<input type="text" id="pCat" class="admin-input" placeholder="التصنيف (مثال: إلكترونيات)">
<input type="number" id="pPrice" class="admin-input" placeholder="السعر">
</div>
<div class="admin-row">
<input type="number" id="pOldPrice" class="admin-input" placeholder="السعر القديم (اختياري)">
<input type="text" id="pEmoji" class="admin-input" placeholder="إيموجي المنتج (مثال: 📱)" maxlength="2">
</div>
<input type="text" id="pBadge" class="admin-input" placeholder="شارة (مثال: جديد، -50%)">
<input type="file" id="pImg" accept="image/*" class="admin-input" onchange="previewImg(event)">
<img id="imgPreview" class="img-preview">
<button class="btn-admin" onclick="addProduct()">➕ إضافة المنتج</button>
</div>
<div class="admin-section" id="manageSection">
<input type="text" class="admin-input" placeholder="🔍 ابحث في المنتجات..." onkeyup="searchAdminProducts(this.value)">
<div class="admin-product-list" id="adminProductsList"></div>
</div>
</div>
</div>
</div>

<script>
const ADMIN_PASS='199506';
let PRODUCTS=JSON.parse(localStorage.getItem('products'))||[
{id:1,name:'سماعات بلوتوث لاسلكية',cat:'إلكترونيات',price:3500,oldPrice:4500,emoji:'🎧',badge:'-22%',img:''},
{id:2,name:'ساعة ذكية رياضية',cat:'إلكترونيات',price:8500,oldPrice:12000,emoji:'⌚',badge:'جديد',img:''},
{id:3,name:'حقيبة ظهر عصرية',cat:'ملابس',price:4200,oldPrice:null,emoji:'🎒',badge:null,img:''},
{id:4,name:'كريم مرطب للوجه',cat:'جمال',price:1800,oldPrice:2500,emoji:'🧴',badge:'-28%',img:''},
{id:5,name:'مصباح LED ذكي',cat:'منزل',price:2900,oldPrice:null,emoji:'💡',badge:'جديد',img:''},
{id:6,name:'حذاء رياضي',cat:'رياضة',price:6500,oldPrice:8500,emoji:'👟',badge:'-24%',img:''}
];
let CART=JSON.parse(localStorage.getItem('cart'))||[];
let CURRENT_CAT='all';
let SEARCH_QUERY='';

function saveProducts(){localStorage.setItem('products',JSON.stringify(PRODUCTS))}
function saveCart(){localStorage.setItem('cart',JSON.stringify(CART));updateCartCount()}
function updateCartCount(){document.getElementById('cartCount').textContent=CART.reduce((s,i)=>s+i.qty,0)}
function formatPrice(p){return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')+' دج'}

function renderProducts(){
let filtered=PRODUCTS.filter(p=>{
let matchCat=CURRENT_CAT==='all'||p.cat===CURRENT_CAT;
let matchSearch=!SEARCH_QUERY||p.name.toLowerCase().includes(SEARCH_QUERY.toLowerCase())||p.cat.toLowerCase().includes(SEARCH_QUERY.toLowerCase());
return matchCat&&matchSearch;
});
document.getElementById('productsGrid').innerHTML=filtered.length?filtered.map(p=>`
<div class="product">
<div class="product-img">${p.img?`<img src="${p.img}" alt="${p.name}">`:p.emoji}${p.badge?`<span class="product-badge">${p.badge}</span>`:''}</div>
<div class="product-info">
<div class="product-cat">${p.cat}</div>
<div class="product-name">${p.name}</div>
<div class="product-price">
<span class="price-current">${formatPrice(p.price)}</span>
${p.oldPrice?`<span class="price-old">${formatPrice(p.oldPrice)}</span>`:''}
</div>
<button class="btn-add" onclick="addToCart(${p.id})">أضف للسلة</button>
</div>
</div>`).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">لا توجد منتجات</div>';
}

function filterCat(cat){CURRENT_CAT=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderProducts()}
function searchProducts(q){SEARCH_QUERY=q;renderProducts()}

function addToCart(id){
let item=CART.find(i=>i.id===id);
if(item){item.qty++}else{CART.push({...PRODUCTS.find(p=>p.id===id),qty:1})}
saveCart();showToast('تمت الإضافة للسلة ✓');
}

function showCart(){
let body=document.getElementById('cartBody');
if(!CART.length){body.innerHTML='<div class="empty-cart"><div class="empty-cart-icon">🛒</div><p>السلة فارغة</p></div>';document.getElementById('cartModal').classList.add('active');return}
let total=CART.reduce((s,i)=>s+i.price*i.qty,0);
body.innerHTML=CART.map(i=>`
<div class="cart-item">
<div class="cart-item-img">${i.img?`<img src="${i.img}">`:i.emoji}</div>
<div class="cart-item-info">
<div class="cart-item-name">${i.name}</div>
<div class="cart-item-price">${formatPrice(i.price)}</div>
<div class="qty-controls">
<button class="qty-btn" onclick="changeQty(${i.id},-1)">-</button>
<span class="qty-num">${i.qty}</span>
<button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
<button class="qty-btn" style="background:#e74c3c" onclick="removeFromCart(${i.id})">🗑️</button>
</div>
</div>
</div>`).join('')+`
<div class="cart-total">
<div class="total-row"><span>المجموع الفرعي:</span><span>${formatPrice(total)}</span></div>
<div class="total-row"><span>التوصيل:</span><span>مجاني</span></div>
<div class="total-row final"><span>الإجمالي:</span><span>${formatPrice(total)}</span></div>
</div>
<button class="btn-checkout" onclick="checkout()">اطلب عبر واتساب 📱</button>`;
document.getElementById('cartModal').classList.add('active');
}

function closeCart(){document.getElementById('cartModal').classList.remove('active')}
function changeQty(id,d){let i=CART.find(x=>x.id===id);i.qty+=d;if(i.qty<=0)CART=CART.filter(x=>x.id!==id);saveCart();showCart()}
function removeFromCart(id){CART=CART.filter(i=>i.id!==id);saveCart();showCart()}
function checkout(){
if(!CART.length)return;
let msg='🛍️ *طلب جديد من Marketplace DZ*%0A%0A';
CART.forEach(i=>{msg+=`▪️ ${i.name}%0A الكمية: ${i.qty} × ${formatPrice(i.price)}%0A`});
let total=CART.reduce((s,i)=>s+i.price*i.qty,0);
msg+=`%0A💰 *الإجمالي: ${formatPrice(total)}*%0A%0Aالاسم: %0Aالعنوان: %0Aالهاتف: `;
window.open(`https://wa.me/213XXXXXXXXX?text=${msg}`,'_blank');
}
function showToast(msg){let t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}

function showAdmin(){
let pass=prompt('كلمة السر:');
if(pass===ADMIN_PASS){
document.getElementById('adminModal').classList.add('active');
switchTab('add');
}else if(pass)alert('كلمة السر خاطئة');
}
function closeAdmin(){document.getElementById('adminModal').classList.remove('active')}
function switchTab(tab){
document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
if(tab==='add'){document.querySelector('.admin-tab:nth-child(1)').classList.add('active');document.getElementById('addSection').classList.add('active')}
else{document.querySelector('.admin-tab:nth-child(2)').classList.add('active');document.getElementById('manageSection').classList.add('active');document.getElementById('adminProductsList').innerHTML=renderAdminProducts()}
}

function previewImg(e){
let file=e.target.files[0];
if(!file)return;
let reader=new FileReader();
reader.onload=ev=>{document.getElementById('imgPreview').src=ev.target.result;document.getElementById('imgPreview').style.display='block'};
reader.readAsDataURL(file);
}

function addProduct(){
let name=document.getElementById('pName').value.trim();
let cat=document.getElementById('pCat').value.trim();
let price=parseInt(document.getElementById('pPrice').value);
let oldPrice=parseInt(document.getElementById('pOldPrice').value)||null;
let emoji=document.getElementById('pEmoji').value.trim()||'📦';
let badge=document.getElementById('pBadge').value.trim();
let img=document.getElementById('imgPreview').src||'';
if(!name||!cat||!price){alert('املأ الحقول المطلوبة');return}
PRODUCTS.push({id:Date.now(),name,cat,price,oldPrice,emoji,badge,img});
saveProducts();
document.getElementById('pName').value='';document.getElementById('pCat').value='';document.getElementById('pPrice').value='';document.getElementById('pOldPrice').value='';document.getElementById('pEmoji').value='';document.getElementById('pBadge').value='';document.getElementById('pImg').value='';document.getElementById('imgPreview').style.display='none';
showToast('تم إضافة المنتج بنجاح ✓');renderProducts();switchTab('manage');
}

function renderAdminProducts(list=PRODUCTS){return list.map(p=>`
<div class="admin-product-item" id="adminItem${p.id}">
<div class="admin-product-thumb">${p.img?`<img src="${p.img}">`:p.emoji}</div>
<div class="admin-product-info">
<div class="admin-product-name">${p.name}</div>
<div class="admin-product-meta">${p.cat} • ${formatPrice(p.price)} ${p.badge?`• ${p.badge}`:''}</div>
</div>
<div class="admin-product-actions">
<button class="btn-edit" onclick="toggleEdit(${p.id})">✏️ تعديل</button>
<button class="btn-delete" onclick="deleteProduct(${p.id})">🗑️ حذف</button>
</div>
</div>
<div class="edit-form" id="editForm${p.id}">
<div class="edit-row">
<input type="text" id="editName${p.id}" class="admin-input" value="${p.name}" placeholder="الاسم">
<input type="text" id="editCat${p.id}" class="admin-input" value="${p.cat}" placeholder="التصنيف">
</div>
<div class="edit-row">
<input type="number" id="editPrice${p.id}" class="admin-input" value="${p.price}" placeholder="السعر">
<input type="number" id="editOldPrice${p.id}" class="admin-input" value="${p.oldPrice||''}" placeholder="السعر القديم">
</div>
<div class="edit-row">
<input type="text" id="editEmoji${p.id}" class="admin-input" value="${p.emoji}" placeholder="إيموجي" maxlength="2">
<input type="text" id="editBadge${p.id}" class="admin-input" value="${p.badge||''}" placeholder="شارة">
</div>
<input type="file" accept="image/*" onchange="previewEditImg(event,${p.id})" style="margin-bottom:7px">
<img id="editImgPreview${p.id}" class="edit-img-preview" ${p.img?`src="${p.img}" style="display:block"`:''}>
<div style="display:flex;gap:7px">
<button class="btn-save-edit" onclick="saveEdit(${p.id})">💾 حفظ</button>
<button class="btn-cancel-edit" onclick="toggleEdit(${p.id})">إلغاء</button>
</div>
</div>`).join('')}
function searchAdminProducts(q){const list=PRODUCTS.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.cat.toLowerCase().includes(q.toLowerCase()));document.getElementById('adminProductsList').innerHTML=renderAdminProducts(list)}
function toggleEdit(id){document.getElementById(`editForm${id}`).classList.toggle('open')}
function previewEditImg(e,id){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const img=document.getElementById(`editImgPreview${id}`);img.src=ev.target.result;img.style.display='block'};reader.readAsDataURL(file)}
function saveEdit(id){const p=PRODUCTS.find(x=>x.id===id);p.name=document.getElementById(`editName${id}`).value.trim();p.cat=document.getElementById(`editCat${id}`).value.trim();p.price=parseInt(document.getElementById(`editPrice${id}`).value);p.oldPrice=parseInt(document.getElementById(`editOldPrice${id}`).value)||null;p.emoji=document.getElementById(`editEmoji${id}`).value.trim()||'📦';p.badge=document.getElementById(`editBadge${id}`).value.trim();const img=document.getElementById(`editImgPreview${id}`);if(img.src)p.img=img.src;saveProducts();renderProducts();showToast('تم حفظ التعديلات');switchTab('manage')}
function deleteProduct(id){if(!confirm('هل أنت متأكد من حذف هذا المنتج؟'))return;PRODUCTS=PRODUCTS.filter(p=>p.id!==id);saveProducts();renderProducts();showToast('تم حذف المنتج');switchTab('manage')}
renderProducts();
</script>
</body>
</html>
